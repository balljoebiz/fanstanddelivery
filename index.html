<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>Small Fan Stand 送貨路線</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Report styles (hidden, used for canvas rendering) -->
    <style id="rptStyles">
        .rpt-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:center;justify-content:center;}
        .rpt-box{background:#fff;border-radius:16px;padding:28px 24px;text-align:center;max-width:320px;width:90%;}
        .rpt-box h3{margin:0 0 18px;font-size:20px;color:#333;}
        .rpt-btn{display:block;width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;color:#fff;}
        .rpt-btn-a{background:#0071e3;}.rpt-btn-b{background:#34c759;}.rpt-btn-x{background:#eee;color:#666;font-size:14px;padding:10px;margin-top:16px;}
        /* Render container - hidden from view */
        #rptRender{position:fixed;left:-9999px;top:0;width:794px;background:#fff;font-family:-apple-system,'Segoe UI',sans-serif;}
        /* Report A */
        .ra-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;}
        .ra-table th{background:#0071e3;color:#fff;padding:8px 6px;font-size:13px;text-align:left;}
        .ra-table td{border-bottom:1px solid #e5e7eb;padding:6px;vertical-align:top;}
        .ra-day-header{background:#f0f4ff;padding:8px 12px;font-weight:700;font-size:15px;color:#0071e3;border-left:4px solid #0071e3;margin:16px 0 6px;}
        .ra-title{text-align:center;padding:24px 0 4px;}
        .ra-title h2{margin:0;font-size:22px;color:#333;}
        .ra-sub{text-align:center;color:#888;font-size:11px;padding:4px 0 16px;}
        .ra-footer{text-align:center;color:#aaa;font-size:10px;padding:12px;border-top:1px solid #eee;margin-top:12px;}
        /* Report B */
        .rb-page{width:794px;min-height:1123px;padding:24px;box-sizing:border-box;background:#fff;page-break-after:always;}
        .rb-title-area{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0071e3;padding-bottom:12px;margin-bottom:16px;}
        .rb-title-area h2{margin:0;font-size:22px;color:#333;}
        .rb-date-badge{background:#ff9500;color:#fff;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:600;}
        .rb-card{display:flex;gap:14px;padding:14px;margin:10px 0;background:#fafbfc;border-radius:12px;border-left:4px solid #34c759;align-items:flex-start;}
        .rb-img-box{width:120px;height:120px;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#e8eaed;}
        .rb-img-box img{width:100%;height:100%;object-fit:cover;}
        .rb-no-img{color:#bbb;font-size:13px;text-align:center;line-height:1.4;}
        .rb-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px;}
        .rb-store-id{font-size:17px;font-weight:700;color:#222;}
        .rb-addr{font-size:13px;color:#555;line-height:1.35;}
        .rb-time{font-size:12px;color:#34c759;font-weight:500;margin-top:2px;}
        .rb-day-section{margin:14px 0;}
        .rb-day-label{background:linear-gradient(135deg,#0071e3,#5856d6);color:#fff;padding:8px 14px;border-radius:8px;font-size:15px;font-weight:700;margin-bottom:10px;}
        .rb-page-footer{margin-top:auto;padding-top:10px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;font-size:11px;color:#888;}
        .rb-empty-row{grid-column:1/-1;text-align:center;padding:30px;color:#ccc;font-size:14px;}
    </style>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Helvetica Neue,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;-webkit-font-smoothing:antialiased;}
        .container{max-width:768px;margin:0 auto;padding:20px 16px 100px;}

        /* ===== Header（v05風格：居中大標題） ===== */
        .header{text-align:center;padding:40px 0 24px;}
        .header h1{font-size:26px;font-weight:600;letter-spacing:-0.5px;}
        .header p{font-size:14px;color:#86868b;margin-top:6px;}

        /* ===== Day Tab Cards（v05：卡片式，陰影+圓角） ===== */
        .day-selector{display:flex;gap:8px;padding:0 4px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
        .day-btn{flex:0 0 auto;min-width:70px;padding:10px 12px;border:none;border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:all 0.3s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 8px rgba(0,0,0,.08);}
        .day-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
        .day-btn.active{background:#0071e3;color:#fff;box-shadow:0 4px 16px rgba(0,113,227,.4);}
        .day-btn .db-date{font-size:11px;opacity:.7;margin-bottom:1px;}
        .day-btn.active .db-date{opacity:.85;}
        .day-btn .db-day{font-size:13px;font-weight:600;margin-bottom:3px;}
        .day-btn .db-count{font-size:17px;font-weight:700;}
        .day-btn.raymond{background:linear-gradient(135deg,#ff9500,#ff5e3a);color:#fff;}
        .day-btn.raymond.active{background:#fff;color:#ff9500;}

        /* ===== Overall Stats（v05：彩色頂邊框） ===== */
        .overall-stats{display:flex;gap:12px;padding:0 4px;margin-bottom:16px;}
        .overall-stat{flex:1;background:#fff;border-radius:14px;padding:14px 12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);}
        .overall-stat.done{border-top:4px solid #34c759;}
        .overall-stat.todo{border-top:4px solid #ff9500;}
        .os-label{font-size:11px;color:#86868b;margin-bottom:4px;}
        .os-value{font-size:28px;font-weight:700;line-height:1;}
        .os-sub{font-size:11px;color:#86868b;margin-top:2px;}
        .overall-stat.done .os-value{color:#34c759;} .overall-stat.todo .os-value{color:#ff9500;}

        /* ===== Day Stats ===== */
        .day-stats{display:flex;gap:12px;padding:0 4px;margin-bottom:18px;}
        .day-stat{flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .day-stat.ds-done{border-left:4px solid #34c759;}
        .day-stat.ds-todo{border-left:4px solid #ff9500;}
        .ds-label{font-size:11px;color:#86868b;margin-bottom:4px;}
        .ds-value{font-size:24px;font-weight:700;line-height:1;}
        .day-stat.ds-done .ds-value{color:#34c759;} .day-stat.ds-todo .ds-value{color:#ff9500;}

        /* ===== Sync Bar ===== */
        .sync-bar{display:flex;gap:8px;padding:0 4px;margin-bottom:6px;flex-wrap:wrap;}
        .sync-btn{flex:1;min-width:72px;padding:12px 8px;border:none;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all 0.25s;}
        .sb-up{background:linear-gradient(135deg,#007aff,#5856d6);color:white;}
        .sb-down{background:#5856d6;color:white;}
        .sb-reset{background:linear-gradient(135deg,#ff6b6b,#ee5a52);color:white;}
        .sb-exp{background:linear-gradient(135deg,#34c759,#30d158);color:white;}
        .sync-msg{text-align:center;font-size:12px;color:#aaa;padding:2px 0;margin-bottom:0;}

        /* ===== Store Card（v05風格） ===== */
        .store-list{} /* no extra wrapper */
        .store-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;
            box-shadow:0 2px 12px rgba(0,0,0,.06);display:flex;align-items:flex-start;gap:12px;transition:all 0.3s;animation:cardFadeIn .3s ease-out;}
        .store-card.completed{opacity:.65;background:#fafafa;}
        @keyframes cardFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

        /* Checkbox */
        .cb-wrap{flex:0 0 26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
        .checkbox{width:24px;height:24px;border:2px solid #d1d1d6;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:#fff;}
        .checkbox.checked{background:#34c759;border-color:#34c759;}
        .checkbox.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:bold;}

        /* Content */
        .sc-body{flex:1;min-width:0;}
        .sc-header-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
        /* Seq Badge (purple gradient) */
        .seq-badge{width:38px;height:38px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0;}
        .store-info{flex:1;min-width:0;}
        .store-id{font-size:16px;font-weight:600;color:#1d1d1f;}
        .store-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
        .day-badge-sm{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;background:#f0f0f5;color:#636366;}
        .dj-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;background:#e3f2fd;color:#007aff;cursor:pointer;}
        .staff-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;background:#fff3e0;color:#ff9500;}
        .store-addr{font-size:12px;color:#555;line-height:1.4;margin-top:4px;word-break:break-word;}

        /* Image Row in card */
        .sc-img-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
        .sc-thumb-w{position:relative;flex-shrink:0;}
        .sc-thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;cursor:pointer;border:1.5px solid #e5e5ea;transition:transform 0.15s;}
        .sc-thumb:hover{transform:scale(1.08);}
        .sc-thumb-del{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:#ff3b30;color:white;border-radius:50%;border:none;font-size:9px;display:flex;align-items:center;justify-content:center;z-index:3;cursor:pointer;line-height:1;opacity:0;transition:opacity 0.2s;}
        .sc-thumb-w:hover .sc-thumb-del{opacity:1;}
        .sc-add-small{width:54px;height:54px;border-radius:8px;border:2px dashed #007aff;background:#f0f8ff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#007aff;flex-shrink:0;transition:all 0.2s;}
        .sc-add-small:hover{background:#e3f2fd;}
        .sc-time-line{margin-top:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
        .sc-time-txt{font-size:12px;color:#34c759;font-weight:500;cursor:pointer;padding:2px 7px;border-radius:6px;transition:background 0.2s;}
        .sc-time-txt:hover{background:rgba(52,199,89,.12);}

        /* Right thumb preview */
        .sc-right-thumb{width:56px;height:56px;border-radius:10px;overflow:hidden;background:#f8f9fa;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        .sc-right-thumb img{width:100%;height:100%;object-fit:cover;}
        .no-img-icon{font-size:22px;color:#ddd;}

        /* ===== Completed Page（表格式） ===== */
        .completed-header{padding:18px 0 10px;}
        .completed-header h2{font-size:22px;font-weight:600;}
        .comp-table{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);}
        .ct-head{display:flex;background:#f5f5f7;padding:12px 16px;font-size:12px;font-weight:600;color:#86868b;border-bottom:1px solid #e5e5e5;}
        .ct-col-time{width:105px;}
        .ct-col-store{flex:1;text-align:center;}
        .ct-col-img{width:60px;text-align:center;}
        .ct-row{display:flex;padding:12px 16px;border-bottom:1px solid #f0f0f0;align-items:center;}
        .ct-row:last-child{border-bottom:none;}
        .ct-r-time{width:105px;font-size:13px;color:#34c759;font-weight:500;cursor:pointer;padding:3px 8px;border-radius:6px;}
        .ct-r-store{flex:1;font-size:14px;color:#1d1d1f;text-align:center;}
        .ct-r-img{width:60px;display:flex;justify-content:center;align-items:center;gap:4px;}
        .ct-empty{text-align:center;padding:40px;color:#aaa;font-size:14px;}

        /* ===== Gallery Page ===== */
        .gallery-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;}
        .gallery-header h2{font-size:22px;font-weight:600;}
        /* Store filter tabs */
        .gal-store-tabs{display:flex;gap:6px;padding:0 4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
        .gst-btn{flex:0 0 auto;padding:7px 14px;border:none;border-radius:18px;background:#fff;font-size:12px;font-weight:500;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.07);white-space:nowrap;}
        .gst-btn.active{background:#007aff;color:#fff;}
        .gst-btn.has-img::after{content:'';position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:#34c759;border-radius:50%;border:2px solid #fff;}
        .gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:3px;}
        .gal-item{aspect-ratio:1;cursor:pointer;overflow:hidden;position:relative;}
        .gal-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.25s;}
        .gal-item:hover img{transform:scale(1.04);}
        .gal-del-overlay{position:absolute;inset:0;background:rgba(255,59,48,.7);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;z-index:2;pointer-events:auto;font-size:26px;color:white;}
        .gal-hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:9px;color:rgba(255,255,255,.65);z-index:3;pointer-events:none;}

        /* ===== Tab Bar（毛玻璃效果） ===== */
        .tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
            border-top:.5px solid rgba(0,0,0,.1);display:flex;justify-content:center;padding:7px 0;padding-bottom:max(7px,env(safe-area-inset-bottom));z-index:200;}
        .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 20px;border:none;background:none;cursor:pointer;transition:opacity 0.2s;}
        .tab-item .ticon{font-size:23px;margin-bottom:3px;}
        .tab-item span{font-size:10px;color:#86868b;font-weight:500;}
        .tab-item.active span{color:#0071e3;}
        .page{display:none;}
        .page.active{display:block;}

        /* ===== Password Screen ===== */
        .pwd-screen{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;z-index:9999;}
        .pwd-screen.hidden{display:none;}
        .pwd-box{background:#fff;padding:38px 28px;border-radius:20px;text-align:center;width:88%;max-width:340px;}
        .pwd-box h2{margin-bottom:8px;color:#333;}
        .pwd-box p{color:#666;margin-bottom:18px;font-size:14px;}
        .pwd-input{width:100%;padding:13px;border:2px solid #e0e0e0;border-radius:10px;font-size:18px;text-align:center;margin-bottom:14px;letter-spacing:4px;}
        .pwd-input:focus{border-color:#667eea;outline:none;}
        .pwd-btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
        .pwd-err{color:#ff3b30;font-size:13px;margin-top:10px;display:none;}
        .pwd-chg-link{color:#667eea;font-size:13px;margin-top:14px;cursor:pointer;text-decoration:underline;display:inline-block;padding:3px 6px;}

        /* Change Pwd */
        .chg-screen{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:none;align-items:center;justify-content:center;z-index:99999;}
        .chg-screen.active{display:flex;animation:fadeInUp .3s ease;}
        .chg-box{background:#fff;padding:38px 28px;border-radius:20px;text-align:center;width:88%;max-width:340px;}
        .chg-title{font-size:17px;font-weight:600;margin-bottom:18px;color:#333;}
        .chg-inp{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:11px;text-align:center;letter-spacing:4px;}
        .chg-btn{width:100%;padding:13px;background:#34c759;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:7px;}
        .chg-err{color:#ff3b30;font-size:12px;margin-top:11px;display:none;}
        .chg-back{color:#667eea;font-size:13px;margin-top:14px;cursor:pointer;text-decoration:underline;display:inline-block;padding:3px 6px;}

        /* Image Modal (Bottom Sheet style) */
        .img-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99997;display:none;align-items:flex-end;}
        .img-modal.show{display:flex;}
        .img-modal-c{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;animation:slideUp .3s ease-out;}
        @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
        .img-m-title{font-size:16px;font-weight:600;text-align:center;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid #e5e5ea;}
        .img-m-btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s;}
        .img-m-btn.photo{background:#007aff;color:#fff;}
        .img-m-btn.gallery{background:#f5f5f7;color:#1d1d1f;}
        .img-m-btn.cancel{background:#f5f5f7;color:#ff3b30;margin-bottom:0;}
        #fileInput,#galleryFileInput{display:none;}

        /* Lightbox */
        .lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:99999;display:none;align-items:center;justify-content:center;flex-direction:column;}
        .lb.active{display:flex;}
        .lb-close{position:absolute;top:18px;right:20px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100001;line-height:1;}
        .lb-del{position:absolute;top:18px;left:20px;background:rgba(255,59,48,.8);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;z-index:100001;}
        .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100001;}
        .lb-nav.p{left:16px;}.lb-nav.n{right:16px;}
        .lb-img{max-width:92%;max-height:78vh;object-fit:contain;border-radius:8px;transition:transform 0.2s ease;cursor:zoom-in;touch-action:none;will-change:transform;}
        .lb-z{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:100001;}
        .lb-zbtn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .lb-ctr{position:absolute;bottom:28px;color:#fff;font-size:14px;z-index:100001;}

        /* Time Modal */
        .tm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99997;display:none;align-items:center;justify-content:center;}
        .tm-overlay.show{display:flex;}
        .tm-box{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.25);}
        .tm-title{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center;}
        .tm-inp{width:100%;padding:13px;border:2px solid #e0e0e0;border-radius:10px;font-size:18px;text-align:center;margin-bottom:16px;}
        .tm-inp:focus{border-color:#0071e3;outline:none;}
        .tm-actions{display:flex;gap:10px;}
        .tm-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
        .tm-cancel{background:#f0f0f5;color:#333;}.tm-save{background:#0071e3;color:#fff;}

        /* Confirm Dialog */
        .cf-dialog{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99998;display:none;align-items:center;justify-content:center;}
        .cf-dialog.show{display:flex;}
        .cf-box{background:#fff;border-radius:16px;padding:24px;width:86%;max-width:320px;text-align:center;}
        .cf-msg{font-size:15px;margin-bottom:18px;line-height:1.5;}
        .cf-btns{display:flex;gap:10px;}

// EXIF
function getExifTime(file){return new Promise(res=>{
    try{EXIF.getData(file,function(){
        const dt=EXIF.getTag(this,'DateTimeOriginal');if(dt){const ex=new Date(dt.replace(/\:/g,'-').replace(/ /,'T'));
            if(!isNaN(ex.getTime()))res(ex.getTime());else res(null);}else res(null);
    });}catch(e){res(null);}setTimeout(()=>res(null),2000);
});}
function compressImage(file,maxSizeKB=300){return new Promise(res=>{
    try{
        const r=new FileReader();
        r.onerror=()=>{console.warn('[IMG] FileReader failed');res(null);}
        r.onload=e=>{try{
            const i=new Image();
            i.onerror=()=>{console.warn('[IMG] Image load failed');res(null);}
            i.onload=()=>{try{
                const c=document.createElement('canvas'),x=c.getContext('2d');
                let w=i.width,h=i.height,m=1200;if(w>m||h>m){const s=Math.min(m/w,m/h);w=Math.round(w*s);h=Math.round(h*s);}
                c.width=w;c.height=h;x.drawImage(i,0,0,w,h);
                let q=0.8,d=c.toDataURL('image/jpeg',q);
                while(d.length/1024>maxSizeKB&&q>0.1){q-=0.1;d=c.toDataURL('image/jpeg',q);
                    if(q<=0.15)break;}
                console.log(`[IMG] Compressed: ${Math.round(d.length/1024)}KB (q=${q})`);
                res(d);
            }catch(err){console.warn('[IMG] Canvas err:',err);res(null);}};
            i.src=e.target.result;
        }catch(err){console.warn('[IMG] Image create err:',err);res(null);}};
        r.readAsDataURL(file);
    }catch(err){console.warn('[IMG] compressImage err:',err);res(null);}
});}

    currentImgKey = storeKey;
    const sid = storeKey.split('-')[1];
    document.getElementById('imTitle').textContent = `為 ${sid} 添加圖片`;
    document.getElementById('imgModal').classList.add('show');
}
function closeImgModal(){
    document.getElementById('imgModal').classList.remove('show');
    currentImgKey = null;
}
function takePhoto(){
    document.getElementById('imgModal').classList.remove('show');
    setTimeout(() => document.getElementById('fileInput').click(), 100);
}
function chooseFromGallery(){
    document.getElementById('imgModal').classList.remove('show');
    setTimeout(() => document.getElementById('galleryFileInput').click(), 100);
}

async function handleFileSelect(e){
    const files = e.target.files;
    if(!files.length || !currentImgKey) return;

    const key = currentImgKey;
    const existingImgs = imageCache[key] || [];
    if(existingImgs.length >= 2) {
        showToast('❌ 每間店舖最多2張圖','error');
        e.target.value='';
        currentImgKey=null;
        return;
    }

    for(let i=0; i<Math.min(files.length, 2-existingImgs.length); i++){
        showToast('📷 處理中...','info');
        const compressed = await compressImage(files[i]);

        // 壓縮失敗防護
        if(!compressed){
            showToast('❌ 圖片壓縮失敗，請重試','error');
            e.target.value='';currentImgKey=null;return;
        }

        const imgId='img_'+Date.now().toString(36)+'_'+Math.random().toString(36).substr(2,4);

        // Save to DB
        await saveImg(key, imgId, compressed);

        // Update cache
        if(!imageCache[key]) imageCache[key]=[];
        imageCache[key].push({id:imgId,data:compressed,time:Date.now()});
        saveIK(key);

        // EXIF 自動時間
        const storeEntry = completedStores[key];
        if(storeEntry){
            try{
                const exifTs = await getExifTime(files[i]);
                if(exifTs){
                    storeEntry.time = exifTs;
                    saveData();
                    showToast(`⏰ 已自動設定為拍照時間`,'info');
                }
            }catch(ex){console.warn('EXIF err:',ex);}
        }
    }

    e.target.value=''; currentImgKey=null;
    renderList(); renderCompleted(); updateStats(); renderGalTabs(); renderGallery();
    showToast('✅ 圖片已保存','success');
}

// RENDER: Day Tabs (v05 card style)
// ============================================================
function renderDayTabs(){
    const el=document.getElementById('dayTabs'),days=Object.keys(originalData);
    const today=new Date(),td=`${today.getMonth()+1}/${today.getDate()}`;
    const dlMap={mon:'10/4',wed:'8/4',thu:'9/4',fri:'10/4'};
    el.innerHTML=days.map(dk=>{
        const st=originalData[dk]||[],dn=DAY_NAMES[dk]||dk,dl=dlMap[dk]||'--/-';
        let done=0;for(const s of st){if(completedStores[mKey(dk,s.id)])done++;}
        const isRay=(dl===td);
        return `<button class="day-btn ${dk===currentDay?'active':''} ${isRay?'raymond':''}" data-d="${dk}" onclick="selDay('${dk}',this)">
            <div class="db-date">${dl}</div><div class="db-day">${dn}</div><div class="db-count">${done}/${st.length}</div></button>`;
    }).join('');
    // Today date
    const d=new Date(),m=d.getMonth()+1,dd=d.getDate();
    document.getElementById('todayDate').textContent=`${new Date().toLocaleDateString('zh-TW',{weekday:'long',month:'long',day:'numeric'})} · ${m}/${dd}`;
}
function selDay(dk,bt){currentDay=dk;document.querySelectorAll('.day-btn').forEach(t=>t.classList.remove('active'));if(bt)bt.classList.add('active');
    renderList();updateStats();renderGalTabs();renderGallery();}

// ============================================================
// RENDER: Stats
// ============================================================
function updateStats(){
    let td=0,tt=0,dd=0,dt=0;
    const cur=originalData[currentDay]||[];
    for(const[dk,st]of Object.entries(originalData)){for(const s of st){completedStores[mKey(dk,s.id)]?td++:tt++;}}
    for(const s of cur){completedStores[mKey(currentDay,s.id)]?dd++:dt++;}
    let pt=0;for(const im of Object.values(imageCache))pt+=im.length;
    document.getElementById('ovDone').textContent=td;document.getElementById('ovTodo').textContent=tt;
    document.getElementById('dsDone').textContent=dd;document.getElementById('dsTodo').textContent=dt;
    renderDayTabs();
}

// RENDER: Gallery (with store filter)
// ============================================================
function renderGalTabs(){
    const el=document.getElementById('galTabs');
    let items=[['全部','__all__']];
    for(const[k,imgs]of Object.entries(imageCache))
        items.push([k.split('-')[1],k]);
    items.sort((a,b)=>a[0].localeCompare(b[0],'zh-HK'));
    el.innerHTML=`<button class="gst-btn ${galFilterSk===null||galFilterSk==='__all__'?'active':''}" onclick="filterGal('__all__',this)">全部</button>`
        +items.slice(1).map(([lbl,sk])=>`<button class="gst-btn ${(galFilterSk===sk?'active':'')} ${imageCache[sk]?.length?'has-img':''}" style="position:relative;" onclick="filterGal('${sk}',this)">${lbl}</button>`).join('');
}
function filterGal(sk,bt){
    galFilterSk=(sk==='__all__')?null:sk;
    document.querySelectorAll('.gst-btn').forEach(b=>b.classList.remove('active'));if(bt)bt.classList.add('active');
    renderGallery();
}
function renderGallery(){
    const g=document.getElementById('galGrid');
    let items=[];
    const keys=galFilterSk?[galFilterSk]:Object.keys(imageCache);
    for(const k of keys){
        const imgs=imageCache[k]||[];
        imgs.forEach((im,idx)=>items.push({k,idx,data:im.data,time:im.time||0}));
    }
    items.sort((a,b)=>(b.time||0)-(a.time||0));
    g.innerHTML=items.length?items.map(it=>{
        const iid=imageCache[it.k][it.idx].id;
        return `<div class="gal-item" data-k="${it.k}" data-idx="${it.idx}"
            onclick="openLb('${it.k}',${it.idx})"
            ontouchstart="galTS(event)" ontouchend="galTE(event)" ontouchmove="galTM(event)">
            <img src="${it.data}" alt="">
            <div class="gal-del-overlay" id="gdo-${it.k}-${it.idx}" onclick="event.stopPropagation();reqDel('${it.k}','${iid}');closeLb();this.closest('.gal-item').remove();">🗑️</div>
            <div class="gal-hint">長按刪除</div></div>`;
    }).join(''):'<div style="grid-column:1/-1;text-align:center;padding:35px;color:#aaa;">尚無圖片</div>';
}
let _gtTimer=null,_gtEl=null,_gtMoved=false,_gtLP=false;
function galTS(e){
    if(e.touches.length!==1)return;
    _gtEl=e.currentTarget;_gtMoved=false;_gtLP=false;
    _gtTimer=setTimeout(()=>{_gtLP=true;if(_gtEl){const o=_gtEl.querySelector('.gal-del-overlay');if(o)o.style.opacity='1';}},500);
}
function galTE(e){
    clearTimeout(_gtTimer);_gtTimer=null;
    // If it was a long press + tap on overlay, don't trigger Lightbox
    if(_gtLP&&e.type==='touchend'){
        e.preventDefault();
        if(_gtEl)_gtEl._lpHandled=true;
    }
}
function galTM(e){if(_gtTimer){clearTimeout(_gtTimer);_gtTimer=null;}}

function openLb(sk,ix){const imgs=imageCache[sk]||[];if(!imgs[ix])return;lbImages=imgs;lbSk=sk;lbIdx=ix;resetZ();showLbImg();

    document.getElementById('lbPrev').style.display=lbImages.length>1?'flex':'none';document.getElementById('lbNext').style.display=lbImages.length>1?'flex':'none';document.getElementById('lbDelBtn').style.display='flex';}
function lbNav(dir){lbIdx=(lbIdx+dir+lbImages.length)%lbImages.length;resetZ();showLbImg();}
function toggleZoom(){zL=zL>1?1:2;if(zL===1){tX=0;tY=0;}applyZ();}
function zoomIn(){zL=Math.min(zL+.5,4);applyZ();}function zoomOut(){zL=Math.max(zL-.5,1);if(zL===1){tX=0;tY=0;}applyZ();}
function resetZ(){zL=1;tX=0;tY=0;applyZ();}function applyZ(){document.getElementById('lbImg').style.transform=`scale(${zL}) translate(${tX}px,${tY}px)`;}
function delLbImg(){if(lbSk&&lbImages[lbIdx]){reqDel(lbSk,lbImages[lbIdx].id);closeLb();}}
// Touch zoom
function getDist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function initTouch(){const im=document.getElementById('lbImg');im.addEventListener('dblclick',onDblClick);im.addEventListener('touchstart',tSH,{passive:false});im.addEventListener('touchmove',tMH,{passive:false});im.addEventListener('touchend',tEH);}
function rmTouch(){const im=document.getElementById('lbImg');im.removeEventListener('dblclick',onDblClick);im.removeEventListener('touchstart',tSH);im.removeEventListener('touchmove',tMH);im.removeEventListener('touchend',tEH);}
function onDblClick(){zL=zL>1?1:2;if(zL===1){tX=0;tY=0;}applyZ();}
let tSD=0,tSZ=1,isP=false,tSX=0,tSY=0,stTX=0,stTY=0;
function tSH(e){if(e.touches.length===2){e.preventDefault();tSD=getDist(e.touches);tSZ=zL;}else if(e.touches.length===1&&zL>1){isP=true;tSX=e.touches[0].clientX;tSY=e.touches[0].clientY;stTX=tX;stTY=tY;}}
function tMH(e){if(e.touches.length===2){e.preventDefault();const cd=getDist(e.touches),s=cd/tSD;zL=Math.max(1,Math.min(4,tSZ*s));if(zL<=1){tX=0;tY=0;}applyZ();}else if(e.touches.length===1&&isP){e.preventDefault();const dx=e.touches[0].clientX-tSX,dy=e.touches[0].clientY-tSY;tX=stTX+dx*.5;tY=stTY+dy*.5;cPan();applyZ();}}
function tEH(e){if(e.touches.length<2)isP=false;}
function cPan(){if(zL<=1){tX=0;tY=0;return;}const sw=window.innerWidth,sh=window.innerHeight,mx=sw*.4*(zL-1),my=sh*.4*(zL-1);tX=Math.max(-mx,Math.min(mx,tX));tY=Math.max(-my,Math.min(my,tY));}
document.addEventListener('keydown',e=>{if(!lbSk)return;if(e.key==='ArrowRight'&&lbIdx<lbImages.length-1)lbNav(1);if(e.key==='ArrowLeft'&&lbIdx>0)lbNav(-1);if(e.key==='Escape')closeLb();});

// Report A: 清單版 → JPG（按實際完成日期分組，5間一行等寬格子表格）
async function genRptA(){
    closeRptModal();
    const entries=Object.entries(completedStores).sort((a,b)=>a[1].time-b[1].time);
    if(!entries.length){showToast('❌ 尚無已完成項目','error');return;}
    // 按【實際完成日期】分組（從 time 戳提取真實 M/D）
    const groups={};
    entries.forEach(([k,d])=>{
        const sid=k.substring(k.lastIndexOf('-')+1);
        const dt=new Date(d.time),dateKey=`${dt.getMonth()+1}/${dt.getDate()}`;
        if(!groups[dateKey])groups[dateKey]=[];
        groups[dateKey].push(sid);
    });
    // 按 M/D 數值排序（先月後日）
    const sortedDates=Object.keys(groups).sort((a,b)=>{
        const [am,ad]=a.split('/').map(Number),[bm,bd]=b.split('/').map(Number);
        return am!==bm?am-bm:ad-bd;
    });
    let total=0,tbody='';
    sortedDates.forEach(ds=>{
        const sids=groups[ds];total+=sids.length;
        // 純文字：逗號分隔，每5個換行（復刻範例）
        let txt=sids.join(', ');
        const parts=[];
        for(let i=0;i<sids.length;i+=5)parts.push(sids.slice(i,i+5).join(', '));
        tbody+=`<tr><td class="ra-d">${ds}</td><td class="ra-s">${parts.join('<br>')}</td><td class="ra-c">${sids.length}</td></tr>`;
    });
        
    const html=`<div id="rptAContent" style="width:794px;background:#fff;padding:48px;box-sizing:border-box;font-family:-apple-system,'PingFang SC','Microsoft JhengHei',sans-serif;">
        <h1 style="text-align:center;font-size:28px;font-weight:700;color:#222;margin-bottom:32px;letter-spacing:1px;">Small Fan Stand 送貨完成列表</h1>
        <style>
        .ra-d{font-weight:700;color:#34c759!important;font-size:20px!important;vertical-align:middle!important;border:1px solid #e0e0e0!important;}
        .ra-s{font-size:16px!important;line-height:1.85!important;padding:12px 10px!important;border:1px solid #e0e0e0!important;text-align:left!important;word-break:break-all!important;letter-spacing:.5px!important;}
        .ra-c{text-align:center;font-weight:700;color:#007aff!important;font-size:18px!important;vertical-align:middle;border:1px solid #e0e0e0!important;}
        </style>
        <table style="width:100%;border-collapse:collapse;border:2px solid #e0e0e0;">
        <thead><tr style="background:#f7f7f7;">
            <th style="border:1px solid #ddd;padding:14px 18px;font-size:17px;width:14%;color:#333;">日期</th>
            <th style="border:1px solid #ddd;padding:14px 8px;font-size:17px;color:#333;">店號</th>
            <th style="border:1px solid #ddd;padding:14px 18px;font-size:17px;width:12%;color:#333;">數量</th>
        </tr></thead>
        <tbody>${tbody}</tbody></table>
        <p style="text-align:center;margin-top:24px;font-size:16px;color:#888;">總計 ${total} 項</p>
        <p style="text-align:center;margin-top:6px;font-size:11px;color:#bbb;">${new Date().toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false})}</p></div>`;
    try{
        const rc=document.getElementById('rptRender');rc.innerHTML=html;
        const canvas=await html2canvas(document.getElementById('rptAContent'),{scale:2,useCORS:true,backgroundColor:'#fff',logging:false});
        const a=document.createElement('a');a.download=`送貨清單_${new Date().toISOString().slice(0,10)}.jpg`;
        a.href=canvas.toDataURL('image/jpeg',0.92);a.click();showToast('✅ 清單已下載','success');
    }catch(err){console.error('[RA]',err);showToast('❌ 報告生成失敗','error');}
}

// Report B: 圖文卡片(6店/A4/嚴格按日分頁) → ZIP(JPG)
async function genRptB(){
    closeRptModal();
    const entries=Object.entries(completedStores).sort((a,b)=>a[1].time-b[1].time);
    if(!entries.length){showToast('❌ 尚無已完成項目','error');return;}
    showToast('⏳ 正在生成圖文報告...','info');
    // 按【實際完成日期】分組（每條記錄帶完整數據）
    const days={};
    entries.forEach(([k,d])=>{
        const dt=new Date(d.time),dateKey=`${dt.getMonth()+1}/${dt.getDate()}`;
        if(!days[dateKey])days[dateKey]=[];
        days[dateKey].push({k,sid:k.substring(k.lastIndexOf('-')+1),time:d.time,imgs:imageCache[k]||[]});
    });
    // 按實際 M/D 排序
    const sortedDates=Object.keys(days).sort((a,b)=>{
        const [am,ad]=a.split('/').map(Number),[bm,bd]=b.split('/').map(Number);
        return am!==bm?am-bm:ad-bd;
    });
    const PER_PAGE=6,zip=new JSZip();
    let gIdx=0;
    for(const dateKey of sortedDates){
        const stores=days[dateKey];if(!stores||!stores.length)continue;
        const dateLabel=`${dateKey}`;
        // 該日期內部分頁（每頁最多6店，不跨日）
        for(let si=0;si<stores.length;si+=PER_PAGE){
            gIdx++;const pg=stores.slice(si,si+PER_PAGE);let cards='';
            pg.forEach((e,idx)=>{
                const imgHtml=e.imgs.length?e.imgs.map(im=>`<img src="${im.data}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" alt="">`).join('')
                    :'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f5f5f5;border-radius:8px;color:#999;font-size:14px;border:1.5px dashed #ccc;">沒有圖片</div>';
                cards+=`<div class="rb-card"><div class="rb-img-box">${imgHtml}</div>
                    <div class="rb-info"><div class="rb-store-id">${gIdx}.${idx+1}. ${e.sid}</div>
                    <div class="rb-addr">${findAddr(e.k)||''}</div><div class="rb-time">✅ ${fmtTime(e.time)}</div></div></div>`;
            });
            // 不足6店用透明占位保持排版
            for(let i=pg.length;i<PER_PAGE;i++)cards+=`<div class="rb-card" style="opacity:0"><div class="rb-img-box"></div><div class="rb-info"><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div></div></div>`;
            const nowS=new Date().toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
            const html=`<div class="rb-page" id="rbp${gIdx}">
                <div class="rb-title-area"><h2>📦 Small Fan Stand 送貨報告</h2><div class="rb-date-badge">${dateLabel}</div></div>
                <div class="rb-day-section"><div class="rb-day-label">日期 ${dateLabel} — 本頁 ${pg.length}/${stores.length} 間</div>${cards}</div>
                <div class="rb-page-footer"><span>第 ${String(gIdx).padStart(2,'0')} 頁</span><span>${nowS}</span></div></div>`;
            try{
                const rc=document.getElementById('rptRender');rc.innerHTML=html;
                const canvas=await html2canvas(document.getElementById(`rbp${gIdx}`),{scale:2,useCORS:true,backgroundColor:'#fff',logging:false});
                zip.file(`送貨報告_${String(gIdx).padStart(2,'0')}.jpg`,canvas.toDataURL('image/jpeg',0.92).split(',')[1],{base64:true});
            }catch(err){console.error('[RB] Page',gIdx,'error:',err);}
        }
    }
    try{const blob=await zip.generateAsync({type:'blob'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`送貨圖文報告_${new Date().toISOString().slice(0,10)}.zip`;a.click();URL.revokeObjectURL(a.href);showToast('✅ 圖文報告已下載（ZIP）','success');}
    catch(err){console.error('[RB] ZIP:',err);showToast('❌ 打包失敗','error');}
}

function findAddr(key){
    const ld=key.lastIndexOf('-'),sid=key.substring(ld+1),dk=key.substring(0,ld);
    const stores=originalData[dk]||[];const s=stores.find(x=>x.id===sid);return s?s.addr:'';
}
</script>

<!-- Report Modal -->
<div class="rpt-modal" id="rptModal" style="display:none;" onclick="if(event.target===this)closeRptModal()">
    <div class="rpt-box"><h3>📄 選擇報告類型</h3>
        <button class="rpt-btn rpt-btn-a" onclick="genRptA()">📊 報告 A：清單版</button>
        <button class="rpt-btn rpt-btn-b" onclick="genRptB()">📸 報告 B：圖文版</button>
        <button class="rpt-btn rpt-btn-x" onclick="closeRptModal()">取消</button></div></div>

<!-- Report Render Container (off-screen for html2canvas) -->
<div id="rptRender"></div>
</body>
